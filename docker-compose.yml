version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: wildguard-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: wildguard

  backend:
    build: ./backend
    container_name: wildguard-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/wildguard
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - ./ml/models:/app/ml_artifacts  # mount trained models

  frontend:
    build: ./frontend
    container_name: wildguard-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: ./frontend/.env
    depends_on:
      - backend

volumes:
  mongo_data:
